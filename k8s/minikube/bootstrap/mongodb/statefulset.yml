apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      name: mongodb
      labels:
        app: mongodb
    spec:
      volumes:
        - name: mongodb
          persistentVolumeClaim:
            claimName: mongodb-pc-volume-claim
      containers:
        - name: mongodb
          image: mongo:latest
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: "/data/db"
              name: mongodb
          envFrom:
            - configMapRef:
                name: mongodb-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always