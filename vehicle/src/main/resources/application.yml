server:
  port: 8080
  error:
    include-message: always

cors:
  allowed-origins: "http://localhost:3000/map"
  allowed-methods: "GET,POST,HEAD,OPTIONS,PUT"
  allowed-headers: "Content-Type,X-Requested-With,accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers"
  exposed-headers: "Access-Control-Allow-Origin,Access-Control-Allow-Credentials"

spring:
  application:
    name: vehicle
  datasource:
    url: jdbc:postgresql://localhost:5332/vehicle
    username: notenger
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format-sql: true
    show-sql: true
  profiles:
    active: default

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true