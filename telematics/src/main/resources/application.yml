server:
  port: 8082

spring:
  application:
    name: telematics
  data:
    mongodb:
      database: telematics
      port: 27017
  mongodb:
    embedded:
      version: 4.0.2
  rabbitmq:
    addresses: localhost:5672
  zipkin:
    base-url: http://localhost:9411
  profiles:
    active: default

rabbitmq:
  exchanges:
    internal: internal.exchange
  queues:
    notification: notification.queue
  routing-keys:
    internal-notification: internal.notification.routing-key

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 4.0.2
      databaseDir: ./database