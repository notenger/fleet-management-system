services:
  postgres:
    container_name: postgres
    image: postgres:14.1
    environment:
      POSTGRES_USER: notenger
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - postgres
    restart: unless-stopped

  mongo:
    container_name: mongo
    image: mongo:latest
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: notenger
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: telematics
    ports:
      - "27017:27017"
    networks:
      - mongo

  rabbitmq:
    image: rabbitmq:3.9.11-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15671:15671"
      - "61613:61613"
    networks:
      - spring

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.4
    command:
      - start-dev
      - --import-realm
    ports:
      - "9081:8080"
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN : admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-config/:/opt/keycloak/data/import/

  eureka-server:
    image: notenger/eureka-server:28.05.2024.13.22.13
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring

  apigw:
    image: notenger/apigw:28.05.2024.13.00.35
    container_name: apigw
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
    depends_on:
      - eureka-server

  vehicle:
    image: public.ecr.aws/b2y2j9p6/vehicle:29.05.2024.11.51.00
    container_name: vehicle
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
      - postgres
    depends_on:
      - postgres

  simulation:
    image: public.ecr.aws/b2y2j9p6/simulation:19.05.2024.16.10.53
    container_name: simulation
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
    depends_on:
      - postgres
      - rabbitmq

  telematics:
    image: public.ecr.aws/b2y2j9p6/telematics:19.05.2024.16.33.37
    container_name: telematics
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
      - mongo
    depends_on:
      - mongo
      - rabbitmq

networks:
  postgres:
    driver: bridge
  mongo:
    driver: bridge
  spring:
    driver: bridge

volumes:
  postgres: