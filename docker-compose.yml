services:
  postgres:
    container_name: postgres
    image: postgres:14.1
    environment:
      POSTGRES_USER: notenger
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - postgres
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:3.9.11-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15671:15671"
      - "61613:61613"
#    volumes:
#      - "./rabbit_enabled_plugins:/etc/rabbitmq/enabled_plugins"
    networks:
      - spring
  eureka-server:
    image: notenger/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
  apigw:
    image: notenger/apigw:latest
    container_name: apigw
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
    depends_on:
      - eureka-server
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.4
    command:
      - start-dev
      - --import-realm
    ports:
      - "9081:8080"
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN : admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak-config/:/opt/keycloak/data/import/
  vehicle-1:
    image: notenger/vehicle:latest
    container_name: vehicle-01
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
      - postgres
    depends_on:
      - postgres
#  vehicle-2:
#    image: notenger/vehicle:latest
#    container_name: vehicle-02
#    ports:
#      - "8092:8080"
#    environment:
#      - SPRING_PROFILES_ACTIVE=docker
#    networks:
#      - spring
#      - postgres
#    depends_on:
#      - postgres
  simulation-1:
    image: notenger/simulation:latest
    container_name: simulation-01
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
    depends_on:
      - postgres
      - rabbitmq
#  simulation-2:
#    image: notenger/simulation:latest
#    container_name: simulation-02
#    ports:
#      - "8094:8081"
#    environment:
#      - SPRING_PROFILES_ACTIVE=docker
#    networks:
#      - spring
#    depends_on:
#      - postgres
#      - rabbitmq
  telematics:
    image: notenger/telematics:latest
    container_name: telematics
    ports:
      - "8082:8082"
      - "27017:27017"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - spring
    depends_on:
      - rabbitmq

networks:
  postgres:
    driver: bridge
  spring:
    driver: bridge

volumes:
  postgres: