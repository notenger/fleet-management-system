server:
  port: 8081
  error:
    include-message: always

cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  exposed-headers: "*"

spring:
  application:
    name: simulation
  rabbitmq:
    host: rabbitmq
    port: 5672
    ssl:
      enabled: false

eureka:
  client:
    enabled: false